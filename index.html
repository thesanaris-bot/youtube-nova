<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Nova Pro v5.0 | Accurate YouTube API Implementation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Poppins:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 20% 30%, #0a0c14, #020408);
            font-family: 'Inter', sans-serif;
            color: white;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 30px; }
        
        /* Header */
        .header { text-align: center; margin-bottom: 40px; }
        .logo {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #a78bfa, #22d3ee);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100% { opacity: 0.9; } 50% { opacity: 1; text-shadow: 0 0 20px rgba(34,211,238,0.3); } }
        .tagline { color: #6c7eaa; margin-top: 8px; }
        
        /* Search Card */
        .search-card {
            background: rgba(18, 22, 40, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 30px;
            border: 1px solid #2d334f;
            margin-bottom: 30px;
        }
        .search-box {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .search-box input {
            flex: 1;
            background: #0f111f;
            border: 1px solid #2d334f;
            border-radius: 60px;
            padding: 16px 24px;
            color: white;
            font-size: 16px;
            outline: none;
        }
        .search-box input:focus { border-color: #4f46e5; box-shadow: 0 0 15px rgba(79,70,229,0.3); }
        .search-box button {
            background: linear-gradient(95deg, #4f46e5, #06b6d4);
            border: none;
            padding: 0 32px;
            border-radius: 60px;
            font-weight: 700;
            color: white;
            cursor: pointer;
        }
        
        /* Filter Row */
        .filter-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #2d334f;
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #0f111f;
            padding: 8px 16px;
            border-radius: 40px;
        }
        .filter-group label { font-size: 13px; color: #a78bfa; font-weight: 600; }
        select {
            background: #1a1c2e;
            border: 1px solid #2d334f;
            border-radius: 30px;
            padding: 8px 16px;
            color: white;
            cursor: pointer;
        }
        
        /* Results */
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
        }
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }
        .video-card {
            background: rgba(14, 17, 27, 0.85);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid #262d48;
            transition: 0.3s;
            cursor: pointer;
        }
        .video-card:hover { transform: translateY(-6px); border-color: #4f46e5; }
        .thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            background: #000;
        }
        .thumbnail.shorts { aspect-ratio: 9/16; }
        .card-content { padding: 16px; }
        .title { font-weight: 700; font-size: 14px; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .channel { font-size: 12px; color: #9aa4cc; margin-bottom: 8px; }
        .badge-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
        .badge {
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
        }
        .badge.cc { background: #064e3b; color: #2dd4bf; }
        .badge.shorts { background: #4f46e5; color: white; }
        .badge.medium { background: #d97706; color: white; }
        .badge.long { background: #dc2626; color: white; }
        
        .loader {
            text-align: center;
            padding: 60px;
            display: none;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #2d334f;
            border-top-color: #4f46e5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .status-message { text-align: center; padding: 60px; color: #6c7eaa; }
        .footer { text-align: center; margin-top: 50px; padding-top: 30px; border-top: 1px solid #2d334f; color: #4a4f6e; font-size: 12px; }
        
        @media (max-width: 768px) {
            .container { padding: 15px; }
            .video-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">YouTube Nova</div>
            <div class="tagline">by Haris — Accurate YouTube API Search with Smart Filters</div>
        </div>

        <div class="search-card">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search any topic... e.g., nature, music, tutorial">
                <button id="searchBtn"><i class="fas fa-search"></i> Search</button>
            </div>
            
            <div class="filter-row">
                <div class="filter-group">
                    <label><i class="fas fa-clock"></i> Duration:</label>
                    <select id="durationFilter">
                        <option value="any">Any Duration</option>
                        <option value="short">Shorts (≤60s, 9:16)</option>
                        <option value="medium">Medium (4-20 min)</option>
                        <option value="long">Long (>20 min)</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label><i class="fas fa-filter"></i> Content Type:</label>
                    <select id="typeFilter">
                        <option value="all">All Content</option>
                        <option value="video">Regular Videos</option>
                        <option value="shorts">YouTube Shorts Only</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="results-header">
            <h3><i class="fas fa-video"></i> Results</h3>
            <span id="resultCount" style="background:#0f111f; padding:5px 12px; border-radius:30px;">0 videos</span>
        </div>

        <div id="loader" class="loader">
            <div class="spinner"></div>
            <p style="margin-top:15px">Fetching videos from YouTube API...</p>
        </div>

        <div id="results" class="video-grid">
            <div class="status-message">
                <i class="fas fa-search" style="font-size:48px; opacity:0.5; display:block; margin-bottom:15px;"></i>
                Enter a search term to find videos
            </div>
        </div>

        <div class="footer">
            YouTube Nova Pro v5.0 | Powered by YouTube Data API v3 | Accurate duration & format detection
        </div>
    </div>

    <script>
        // ============================================
        // YOUTUBE API CONFIGURATION
        // ============================================
        // IMPORTANT: Replace this with your actual YouTube API Key
        // Get it from: https://console.cloud.google.com/apis/credentials
        const YOUTUBE_API_KEY = 'AIzaSyDWAHjHNYoQqZwOXWZgMK2KaaoeIyR1I7w';
        
        // ============================================
        // HELPER FUNCTIONS
        // ============================================
        
        // Parse ISO 8601 duration (PT1H2M30S) to seconds
        function parseDurationToSeconds(duration) {
            if (!duration) return null;
            const match = duration.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
            if (!match) return null;
            const hours = parseInt(match[1] || 0);
            const minutes = parseInt(match[2] || 0);
            const seconds = parseInt(match[3] || 0);
            return hours * 3600 + minutes * 60 + seconds;
        }
        
        // Format seconds to readable string
        function formatDuration(seconds) {
            if (!seconds) return 'Unknown';
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            if (hours > 0) return `${hours}h ${minutes}m`;
            if (minutes > 0) return `${minutes}m ${secs}s`;
            return `${secs}s`;
        }
        
        // Determine video category based on duration
        function getVideoCategory(durationSeconds) {
            if (!durationSeconds) return 'unknown';
            if (durationSeconds <= 60) return 'shorts';
            if (durationSeconds >= 240 && durationSeconds <= 1200) return 'medium';
            if (durationSeconds > 1200) return 'long';
            return 'regular';
        }
        
        // Get badge class and text
        function getBadgeInfo(category, isCC) {
            if (isCC) return { class: 'cc', text: '✓ Creative Commons' };
            switch(category) {
                case 'shorts': return { class: 'shorts', text: '📱 YouTube Short (9:16)' };
                case 'medium': return { class: 'medium', text: '🎬 Medium Length' };
                case 'long': return { class: 'long', text: '🎞️ Long Video' };
                default: return { class: 'cc', text: 'Standard Video' };
            }
        }
        
        // Escape HTML
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // ============================================
        // MAIN SEARCH FUNCTION
        // ============================================
        
        async function searchYouTube() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) {
                alert('Please enter a search term');
                return;
            }
            
            const durationFilter = document.getElementById('durationFilter').value;
            const typeFilter = document.getElementById('typeFilter').value;
            
            const resultsDiv = document.getElementById('results');
            const loader = document.getElementById('loader');
            const resultCountSpan = document.getElementById('resultCount');
            
            // Show loader
            resultsDiv.innerHTML = '';
            loader.style.display = 'block';
            resultCountSpan.innerText = 'Loading...';
            
            try {
                // STEP 1: Search for videos (with CC license filter)
                let searchUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query)}&type=video&videoLicense=creativeCommon&maxResults=30&key=${YOUTUBE_API_KEY}`;
                
                const searchResponse = await fetch(searchUrl);
                const searchData = await searchResponse.json();
                
                if (searchData.error) {
                    throw new Error(searchData.error.message);
                }
                
                if (!searchData.items || searchData.items.length === 0) {
                    loader.style.display = 'none';
                    resultsDiv.innerHTML = '<div class="status-message"><i class="fas fa-inbox"></i><p>No Creative Commons videos found. Try a different search term.</p></div>';
                    resultCountSpan.innerText = '0 videos';
                    return;
                }
                
                // STEP 2: Get video IDs
                const videoIds = searchData.items.map(item => item.id.videoId).join(',');
                
                // STEP 3: Fetch video details (duration, statistics)
                const detailsUrl = `https://www.googleapis.com/youtube/v3/videos?part=contentDetails,snippet&id=${videoIds}&key=${YOUTUBE_API_KEY}`;
                const detailsResponse = await fetch(detailsUrl);
                const detailsData = await detailsResponse.json();
                
                // STEP 4: Create duration map
                const videoDetailsMap = {};
                if (detailsData.items) {
                    detailsData.items.forEach(item => {
                        const durationSeconds = parseDurationToSeconds(item.contentDetails.duration);
                        videoDetailsMap[item.id] = {
                            durationSeconds: durationSeconds,
                            durationFormatted: formatDuration(durationSeconds),
                            category: getVideoCategory(durationSeconds),
                            title: item.snippet.title,
                            channel: item.snippet.channelTitle
                        };
                    });
                }
                
                // STEP 5: Filter videos based on user selection
                let filteredVideos = [];
                
                for (const item of searchData.items) {
                    const videoId = item.id.videoId;
                    const details = videoDetailsMap[videoId];
                    
                    if (!details) continue;
                    
                    const category = details.category;
                    let includeVideo = true;
                    
                    // Apply duration filter
                    if (durationFilter === 'short' && category !== 'shorts') includeVideo = false;
                    if (durationFilter === 'medium' && category !== 'medium') includeVideo = false;
                    if (durationFilter === 'long' && category !== 'long') includeVideo = false;
                    
                    // Apply content type filter
                    if (typeFilter === 'shorts' && category !== 'shorts') includeVideo = false;
                    if (typeFilter === 'video' && category === 'shorts') includeVideo = false;
                    
                    if (includeVideo) {
                        filteredVideos.push({
                            id: videoId,
                            title: item.snippet.title,
                            channel: item.snippet.channelTitle,
                            thumbnail: item.snippet.thumbnails.high?.url || item.snippet.thumbnails.medium?.url,
                            durationSeconds: details.durationSeconds,
                            durationFormatted: details.durationFormatted,
                            category: category,
                            isCC: true
                        });
                    }
                }
                
                loader.style.display = 'none';
                
                if (filteredVideos.length === 0) {
                    let message = 'No videos match your filters. ';
                    if (durationFilter === 'short') message += 'Try selecting "Any Duration" to see all videos.';
                    else if (typeFilter === 'shorts') message += 'This search has no Shorts. Try "All Content".';
                    else message += 'Try changing your filter settings.';
                    
                    resultsDiv.innerHTML = `<div class="status-message"><i class="fas fa-filter"></i><p>${message}</p></div>`;
                    resultCountSpan.innerText = '0 videos';
                    return;
                }
                
                // STEP 6: Display results
                displayVideos(filteredVideos);
                resultCountSpan.innerText = `${filteredVideos.length} videos`;
                
            } catch (error) {
                console.error('Error:', error);
                loader.style.display = 'none';
                resultsDiv.innerHTML = `<div class="status-message"><i class="fas fa-exclamation-triangle" style="color:#f87171;"></i><p style="color:#f87171;">Error: ${error.message}</p><p style="margin-top:10px;">Make sure your YouTube API key is valid and YouTube Data API v3 is enabled.</p></div>`;
                resultCountSpan.innerText = 'Error';
            }
        }
        
        // ============================================
        // DISPLAY RESULTS
        // ============================================
        
        function displayVideos(videos) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';
            
            videos.forEach(video => {
                const badgeInfo = getBadgeInfo(video.category, video.isCC);
                const isShort = video.category === 'shorts';
                const thumbnailClass = isShort ? 'shorts' : '';
                
                // Determine aspect ratio display
                const aspectRatioText = isShort ? '9:16 (Vertical)' : '16:9 (Horizontal)';
                
                const card = document.createElement('div');
                card.className = 'video-card';
                card.onclick = () => window.open(`https://www.youtube.com/watch?v=${video.id}`, '_blank');
                
                card.innerHTML = `
                    <img class="thumbnail ${thumbnailClass}" src="${video.thumbnail}" alt="${escapeHtml(video.title)}" loading="lazy">
                    <div class="card-content">
                        <div class="title">${escapeHtml(video.title)}</div>
                        <div class="channel"><i class="fas fa-user"></i> ${escapeHtml(video.channel)}</div>
                        <div class="badge-row">
                            <span class="badge ${badgeInfo.class}">${badgeInfo.text}</span>
                            <span class="badge" style="background:#1a1c2e;"><i class="far fa-clock"></i> ${video.durationFormatted}</span>
                            <span class="badge" style="background:#1e1b4b;"><i class="fas ${isShort ? 'fa-mobile-alt' : 'fa-tv'}"></i> ${aspectRatioText}</span>
                        </div>
                    </div>
                `;
                resultsDiv.appendChild(card);
            });
        }
        
        // ============================================
        // EVENT LISTENERS
        // ============================================
        
        document.getElementById('searchBtn').addEventListener('click', searchYouTube);
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchYouTube();
        });
        
        // Auto-search when filters change (optional)
        document.getElementById('durationFilter').addEventListener('change', () => {
            if (document.getElementById('searchInput').value.trim()) searchYouTube();
        });
        document.getElementById('typeFilter').addEventListener('change', () => {
            if (document.getElementById('searchInput').value.trim()) searchYouTube();
        });
        
        // Initial load with default search
        setTimeout(() => {
            document.getElementById('searchInput').value = 'nature landscape';
            searchYouTube();
        }, 500);
    </script>
</body>
</html>
